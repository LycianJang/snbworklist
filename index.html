<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0a0a0f;--bg-card:#12121a;--bg-card-hover:#1a1a26;--bg-input:#16161f;--border:#2a2a3a;--border-focus:#6366f1;--text:#e8e8ef;--text-dim:#8888a0;--text-muted:#55556a;--accent:#6366f1;--accent-glow:rgba(99,102,241,0.15);--green:#22c55e;--green-bg:rgba(34,197,94,0.1);--red:#ef4444;--red-bg:rgba(239,68,68,0.15);--yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.1);--blue:#3b82f6;--blue-bg:rgba(59,130,246,0.1);--cyan:#06b6d4;--orange:#f97316;--pink:#ec4899;--hi-orig:#00e5ff;--hi-orig-bg:rgba(0,229,255,0.12)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app-header{background:linear-gradient(135deg,#12121a,#1a1028);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header h1{font-size:20px;font-weight:700;letter-spacing:-0.5px}.app-header h1 span{color:var(--accent)}.header-actions{display:flex;gap:6px}
.btn{font-family:inherit;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--bg-card-hover);border-color:var(--text-muted)}.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn-primary:hover{background:#5558e6}
.btn-sm{padding:5px 10px;font-size:12px}.btn-icon{padding:5px 7px;font-size:12px}.btn-warn{background:var(--yellow);border-color:var(--yellow);color:#000}
.tab-bar{display:flex;gap:0;padding:0 24px;background:var(--bg-card);border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{font-family:inherit;font-size:13px;font-weight:500;padding:12px 18px;border:none;background:none;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.main-content{padding:18px 24px;max-width:1600px;margin:0 auto}.section-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.yellow{color:var(--yellow)}.stat-value.blue{color:var(--blue)}.stat-value.accent{color:var(--accent)}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-wrapper{position:relative;flex:1;min-width:160px}.search-wrapper::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.search-input{width:100%;padding:8px 12px 8px 32px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-family:inherit;font-size:13px;outline:none}
.search-input:focus{border-color:var(--border-focus)}
select.filter-select{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-family:inherit;font-size:12px;outline:none;cursor:pointer}
.year-nav{display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.year-tab{font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);cursor:pointer;transition:all .15s}
.year-tab:hover{border-color:var(--text-muted);color:var(--text)}.year-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.year-tab.today-btn{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);color:#22c55e;font-weight:700}.year-tab.today-btn:hover{background:rgba(34,197,94,0.2);border-color:#22c55e}
.month-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.month-tab{font-family:inherit;font-size:11px;font-weight:500;padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);cursor:pointer}
.month-tab:hover{border-color:var(--text-muted);color:var(--text)}.month-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.bulk-bar{display:none;align-items:center;gap:10px;padding:8px 14px;margin-bottom:10px;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.25);border-radius:10px;font-size:12px}
.bulk-bar.show{display:flex}.bulk-bar .bulk-count{font-weight:700;color:var(--accent)}
.table-container{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:hidden}.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#16161f;padding:8px 8px;text-align:left;font-weight:600;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0}
thead th:hover{color:var(--text)}thead th .sort-arrow{margin-left:2px;font-size:8px;opacity:0.4}thead th.sorted .sort-arrow{opacity:1;color:var(--accent)}thead th.no-sort{cursor:default}
tbody tr{border-bottom:1px solid rgba(42,42,58,0.4);transition:all .15s ease}
tbody tr:hover{background:rgba(99,102,241,0.07)!important;box-shadow:inset 0 0 0 1px rgba(99,102,241,0.15)}
tbody tr.row-selected{background:rgba(99,102,241,0.08)}tbody tr.date-alt{background:rgba(99,130,246,0.06)}tbody tr.date-alt:hover{background:rgba(99,102,241,0.12)!important}
tbody td{padding:7px 8px;white-space:nowrap}tbody td.wrap{white-space:normal;max-width:180px}
.row-cb{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
tr.row-cancelled td.col-title,tr.row-cancelled td.col-status,tr.row-cancelled td.col-ytdate{color:var(--red)!important;background:var(--red-bg)!important}tr.row-cancelled td.col-title{font-weight:600}
.original-highlight{color:var(--hi-orig)!important;font-weight:700!important;background:var(--hi-orig-bg);padding:2px 7px;border-radius:4px;border:1px solid rgba(0,229,255,0.25)}
.badge{display:inline-block;padding:2px 8px;border-radius:16px;font-size:10px;font-weight:600}
.badge-완료{background:var(--green-bg);color:var(--green)}.badge-취소{background:var(--red-bg);color:var(--red)}.badge-작업중{background:var(--yellow-bg);color:var(--yellow)}.badge-미공개{background:rgba(99,102,241,0.12);color:var(--accent)}.badge-예정{background:var(--blue-bg);color:var(--blue)}
.cam-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.cam-Zoom{background:rgba(6,182,212,0.12);color:var(--cyan)}.cam-1{background:rgba(249,115,22,0.12);color:var(--orange)}.cam-풍경{background:rgba(236,72,153,0.12);color:var(--pink)}.cam-3{background:rgba(99,102,241,0.12);color:var(--accent)}.cam-사이드캠{background:rgba(34,197,94,0.12);color:var(--green)}.cam-녹음실{background:rgba(245,158,11,0.12);color:var(--yellow)}.cam-서비스{background:rgba(148,163,184,0.15);color:#94a3b8}
td.inline-editable{cursor:pointer;position:relative}td.inline-editable:hover{background:rgba(99,102,241,0.06)}
.inline-select{background:var(--bg-input);border:1px solid var(--border-focus);border-radius:5px;color:var(--text);font-family:inherit;font-size:11px;padding:3px 4px;outline:none;cursor:pointer;max-width:85px}
.ytdate-inline{cursor:pointer;padding:2px 6px;border-radius:5px;transition:background .15s;display:inline-flex;align-items:center}.ytdate-inline:hover{background:rgba(99,102,241,0.15)}
.ytdate-empty{color:var(--text-muted);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:5px;border:1px dashed var(--border);transition:all .15s}.ytdate-empty:hover{border-color:var(--accent);color:var(--accent)}
.ytdate-clickable{cursor:pointer;transition:opacity .15s}.ytdate-clickable:hover{opacity:0.8}
.ytdate-edit-input{background:var(--bg-input);border:1px solid var(--border-focus);border-radius:5px;color:var(--text);font-family:inherit;font-size:11px;padding:3px 5px;color-scheme:dark;outline:none;width:120px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;justify-content:center;align-items:flex-start;padding-top:40px;overflow-y:auto}
.modal-overlay.show{display:flex}.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;width:660px;max-width:95vw;padding:22px;margin-bottom:40px;animation:modalIn .2s ease-out}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column;gap:3px}.form-group.full{grid-column:1/-1}
.form-group label{font-size:10px;font-weight:600;color:var(--text-dim)}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-family:inherit;font-size:12px;outline:none}
.form-group input[type="date"]{color-scheme:dark;cursor:pointer}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--border-focus)}
.form-group textarea{resize:vertical;min-height:50px}.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.autocomplete-wrapper{position:relative}.autocomplete-list{display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:7px;max-height:140px;overflow-y:auto;z-index:10;margin-top:2px}
.autocomplete-list.show{display:block}.autocomplete-item{padding:6px 10px;font-size:12px;cursor:pointer}.autocomplete-item:hover{background:var(--bg-card-hover)}
.schedule-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:18px}.schedule-header{padding:7px;text-align:center;font-size:11px;font-weight:600;color:var(--text-dim)}
.schedule-cell{background:var(--bg-card);border:1px solid var(--border);border-radius:7px;padding:5px;min-height:80px}.schedule-cell:hover{border-color:var(--text-muted)}.schedule-cell.today{border-color:var(--accent);background:var(--accent-glow)}.schedule-cell.other-month{opacity:0.3}
.schedule-date{font-size:10px;font-weight:600;margin-bottom:2px;color:var(--text-dim)}.schedule-cell.today .schedule-date{color:var(--accent)}
.schedule-item{font-size:9px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:var(--accent-glow);color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.schedule-item.published{background:var(--green-bg);color:var(--green)}.schedule-item.cancelled{background:var(--red-bg);color:var(--red);text-decoration:line-through}
.schedule-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px}.schedule-nav h3{font-size:17px;font-weight:700;min-width:150px;text-align:center}
.import-zone{border:2px dashed var(--border);border-radius:10px;padding:36px;text-align:center;color:var(--text-dim);cursor:pointer;transition:all .2s}.import-zone:hover{border-color:var(--accent);color:var(--text)}.import-zone.dragover{border-color:var(--accent);background:var(--accent-glow)}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)}.page-btns{display:flex;gap:4px}
.toast-container{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 18px;border-radius:8px;font-size:12px;font-weight:500;animation:toastIn .3s ease-out}
.toast-success{background:#166534;color:#bbf7d0}.toast-error{background:#991b1b;color:#fecaca}.toast-info{background:#1e3a5f;color:#bfdbfe}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:768px){.app-header{padding:10px 12px}.app-header h1{font-size:15px}.tab-bar{padding:0 12px}.main-content{padding:12px}.filter-bar{flex-direction:column}.form-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header class="app-header">
  <h1>🎙️ <span>SNB</span> Studio 작업 관리</h1>
  <div class="header-actions">
    <button class="btn" onclick="exportJSON()">💾 JSON</button>
    <button class="btn" onclick="importJSON()">📂 JSON</button>
    <input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="handleJSONImport(event)">
  </div>
</header>
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="video" onclick="switchTab('video')">🎬 영상 작업 목록</button>
  <button class="tab-btn" data-tab="audio" onclick="switchTab('audio')">🎤 녹음 작업 목록</button>
  <button class="tab-btn" data-tab="cd" onclick="switchTab('cd')">💿 CD작업 목록</button>
  <button class="tab-btn" data-tab="schedule" onclick="switchTab('schedule')">📅 유튜브 스케줄</button>
  <button class="tab-btn" data-tab="import" onclick="switchTab('import')">📥 CSV 가져오기</button>
</nav>

<!-- ═══ 공통 작업 목록 컨테이너 (3탭 공유 구조) ═══ -->
<div class="main-content tab-content" id="tab-video">
  <div class="stats-row" id="statsRow_video"></div>
  <div class="year-nav" id="yearNav_video"></div>
  <div class="month-tabs" id="monthTabs_video"></div>
  <div class="filter-bar" id="filterBar_video"></div>
  <div class="bulk-bar" id="bulkBar_video"><span><span class="bulk-count" id="bulkCount_video">0</span>건 선택</span><span style="color:var(--text-dim)">→</span><select class="filter-select" id="bulkAction_video" style="font-size:11px"><option value="">일괄 변경</option><option value="status:완료">→ 완료</option><option value="status:취소">→ 취소</option><option value="status:작업중">→ 작업중</option></select><button class="btn btn-sm btn-warn" onclick="applyBulk('video')">적용</button><button class="btn btn-sm" onclick="clearSel('video')" style="margin-left:auto">해제</button></div>
  <div class="table-container"><div class="table-scroll"><table><thead><tr id="tHead_video"></tr></thead><tbody id="tBody_video"></tbody></table></div><div class="pagination" id="pag_video"></div></div>

<div class="main-content tab-content" id="tab-audio" style="display:none">

  <div class="year-nav" id="yearNav_audio"></div>
  <div class="month-tabs" id="monthTabs_audio"></div>

  <div class="table-container"><div class="table-scroll"><table><thead><tr id="tHead_audio"></tr></thead><tbody id="tBody_audio"></tbody></table></div><div class="pagination" id="pag_audio"></div></div>
</div>

<div class="main-content tab-content" id="tab-cd" style="display:none">

  <div class="year-nav" id="yearNav_cd"></div>
  <div class="month-tabs" id="monthTabs_cd"></div>
  <div class="filter-bar" id="filterBar_cd"></div>

  <div class="table-container"><div class="table-scroll"><table><thead><tr id="tHead_cd"></tr></thead><tbody id="tBody_cd"></tbody></table></div><div class="pagination" id="pag_cd"></div></div>
</div>

<div class="main-content tab-content" id="tab-schedule" style="display:none">
  <div class="schedule-nav"><button class="btn btn-sm" onclick="changeMonth(-1)">◀</button><h3 id="scheduleMonthLabel"></h3><button class="btn btn-sm" onclick="changeMonth(1)">▶</button><button class="btn btn-sm" onclick="goSchedToday()">오늘</button></div>
  <div class="schedule-grid" id="scheduleGrid"></div><div id="scheduleDayDetail"></div>
</div>

<div class="main-content tab-content" id="tab-import" style="display:none">

  </div>

    <div style="font-size:36px;margin-bottom:8px">📄</div><div style="font-size:14px;font-weight:600;margin-bottom:4px">CSV 파일을 드래그하거나 클릭</div><div style="font-size:11px">UTF-8 .csv 파일</div>
  </div>
  <input type="file" id="csvFileInput" accept=".csv,.tsv,.txt" style="display:none" onchange="handleCSVFile(event)">
  <div id="csvPreview" style="margin-top:16px"></div><div id="csvMapping" style="margin-top:16px"></div>

</div>
<div class="toast-container" id="toastContainer"></div>

const state={};
['video','audio','cd'].forEach(t=>{
  state[t]={records:[],editId:null,sortCol:'date',sortDir:-1,page:1,selYear:new Date().getFullYear().toString(),selMonth:String(new Date().getMonth()+1).padStart(2,'0'),selected:new Set()};
});

// ═══ FIREBASE HELPERS ═══
function loadLocal(t){try{return JSON.parse(localStorage.getItem('snb_'+t+'_v1'))||[];}catch(e){return[];}}
function saveLocal(t){localStorage.setItem('snb_'+t+'_v1',JSON.stringify(state[t].records));}
async function fsGet(t){try{const s=await db.collection(TABS[t].collection).get();return s.docs.map(d=>{const o=d.data();o.id=d.id;return o;});}catch(e){return null;}}
async function fsPut(t,r){try{await db.collection(TABS[t].collection).doc(r.id).set(r);}catch(e){}}
async function fsDel(t,id){try{await db.collection(TABS[t].collection).doc(id).delete();}catch(e){}}
async function fsSync(t){
  try{
    toast('동기화 중...','info');
    const snap=await db.collection(TABS[t].collection).get();
    const batch1Docs=snap.docs;
    for(let i=0;i<batch1Docs.length;i+=450){const b=db.batch();batch1Docs.slice(i,i+450).forEach(d=>b.delete(d.ref));await b.commit();}
    const recs=state[t].records;
    for(let i=0;i<recs.length;i+=450){const b=db.batch();recs.slice(i,i+450).forEach(r=>{b.set(db.collection(TABS[t].collection).doc(r.id),r);});await b.commit();}
    toast(`동기화 완료 (${recs.length}건)`,'success');
  }catch(e){toast('동기화 실패','error');}
  saveLocal(t);
}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// ═══ TAB SWITCHING ═══
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
  document.getElementById('tab-'+tab).style.display='';
  if(tab==='schedule'){renderSchedule();return;}
  if(tab==='import')return;
  renderAll(tab);
}

// ═══ RENDER ALL ═══
function renderAll(t){renderStats(t);renderYearNav(t);renderMonthTabs(t);renderFilterBar(t);renderTable(t);}

function getPrefix(t){const s=state[t];return s.selMonth==='all'?s.selYear:s.selYear+'-'+s.selMonth;}

// ═══ STATS ═══
function renderStats(t){
  const recs=state[t].records.filter(r=>r.date&&r.date.startsWith(getPrefix(t)));
  const tot=recs.length,done=recs.filter(r=>r.status==='완료').length,wip=recs.filter(r=>r.status==='작업중').length,can=recs.filter(r=>r.status==='취소').length;
  document.getElementById('statsRow_'+t).innerHTML=`
    <div class="stat-card"><div class="stat-label">전체</div><div class="stat-value accent">${tot}</div></div>
    <div class="stat-card"><div class="stat-label">작업중</div><div class="stat-value yellow">${wip}</div></div>
    <div class="stat-card"><div class="stat-label">완료</div><div class="stat-value green">${done}</div></div>
    <div class="stat-card"><div class="stat-label">취소</div><div class="stat-value red">${can}</div></div>`;
}

// ═══ YEAR NAV ═══
function renderYearNav(t){
  const s=state[t],years=[...new Set(s.records.map(r=>r.date?r.date.slice(0,4):'').filter(Boolean))].sort().reverse();
  const cy=new Date().getFullYear().toString();if(!years.includes(cy))years.unshift(cy);years.sort().reverse();
  if(!years.includes(s.selYear))s.selYear=years[0]||cy;
  let h=`<button class="year-tab today-btn" onclick="goNow('${t}')">📍 이번 달</button>`;
  h+=years.map(y=>`<button class="year-tab ${s.selYear===y?'active':''}" onclick="selYear('${t}','${y}')">${y}년</button>`).join('');
  document.getElementById('yearNav_'+t).innerHTML=h;
}
function selYear(t,y){const s=state[t];s.selYear=y;s.selMonth='all';s.page=1;s.selected.clear();renderAll(t);}
function goNow(t){const s=state[t];s.selYear=new Date().getFullYear().toString();s.selMonth=String(new Date().getMonth()+1).padStart(2,'0');s.page=1;s.selected.clear();renderAll(t);}

// ═══ MONTH TABS ═══
function renderMonthTabs(t){
  const s=state[t],mos=[...new Set(s.records.filter(r=>r.date&&r.date.startsWith(s.selYear)).map(r=>r.date.slice(5,7)))].sort();
  let h=`<button class="month-tab ${s.selMonth==='all'?'active':''}" onclick="selMo('${t}','all')">${s.selYear}년 전체</button>`;
  mos.forEach(m=>{h+=`<button class="month-tab ${s.selMonth===m?'active':''}" onclick="selMo('${t}','${m}')">${parseInt(m)}월</button>`;});
  document.getElementById('monthTabs_'+t).innerHTML=h;
}
function selMo(t,m){state[t].selMonth=m;state[t].page=1;state[t].selected.clear();renderAll(t);}

// ═══ FILTER BAR ═══
function renderFilterBar(t){
  const cfg=TABS[t];
  document.getElementById('filterBar_'+t).innerHTML=`
    <div class="search-wrapper"><input type="text" class="search-input" id="search_${t}" placeholder="검색..." oninput="renderTable('${t}')"></div>
    <select class="filter-select" id="fStatus_${t}" onchange="renderTable('${t}')"><option value="">상태 전체</option><option value="작업중">작업중</option><option value="완료">완료</option><option value="취소">취소</option></select>
    <button class="btn btn-primary" onclick="openForm('${t}')">+ 새 작업</button>`;
}

// ═══ GET FILTERED ═══
function getFiltered(t){
  const s=state[t],prefix=getPrefix(t);
  const q=(document.getElementById('search_'+t)?.value||'').trim().toLowerCase();
  const st=document.getElementById('fStatus_'+t)?.value||'';
  let f=s.records.filter(r=>{
    if(!r.date||!r.date.startsWith(prefix))return false;
    if(st&&r.status!==st)return false;
    if(q){const vals=Object.values(r).join(' ').toLowerCase();if(!vals.includes(q))return false;}
    return true;
  });
  f.sort((a,b)=>{
    let va=a[s.sortCol]||'',vb=b[s.sortCol]||'';
    if(s.sortCol==='order'||s.sortCol==='songCount'||s.sortCol==='cdMake'||s.sortCol==='usbMake'||s.sortCol==='singCount'){va=parseInt(va)||0;vb=parseInt(vb)||0;}
    if(va<vb)return -1*s.sortDir;if(va>vb)return 1*s.sortDir;
    if(a.date<b.date)return -1;if(a.date>b.date)return 1;
    return (parseInt(a.order)||0)-(parseInt(b.order)||0);
  });
  return f;
}

// ═══ RENDER TABLE ═══
function renderTable(t){
  const cfg=TABS[t],s=state[t],cols=cfg.columns;
  const filtered=getFiltered(t),totalP=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(s.page>totalP)s.page=totalP;
  const start=(s.page-1)*PAGE_SIZE,page=filtered.slice(start,start+PAGE_SIZE);

  // Head
  const allChk=page.length>0&&page.every(r=>s.selected.has(r.id));
  document.getElementById('tHead_'+t).innerHTML=cols.map(c=>{
    if(c.key==='_cb')return `<th class="no-sort" style="width:${c.w};text-align:center"><input type="checkbox" class="row-cb" ${allChk?'checked':''} onchange="togAll('${t}',this.checked)"></th>`;
    if(c.key==='_actions')return `<th style="width:${c.w}"></th>`;
    const sorted=s.sortCol===c.key;const arrow=sorted?(s.sortDir===1?'▲':'▼'):'▲';
    return `<th class="${sorted?'sorted':''}" style="width:${c.w}" onclick="togSort('${t}','${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('');

  // Body
  document.getElementById('tBody_'+t).innerHTML=page.map((r,idx)=>{
    const isCan=r.status==='취소',isOrig=(r.original||'')==='본인곡';
    let dg=0,prev=page[0]?.date||'';for(let i=1;i<=idx;i++){if((page[i].date||'')!==prev){dg++;prev=page[i].date||'';}}
    const rc=[isCan?'row-cancelled':'',s.selected.has(r.id)?'row-selected':'',dg%2?'date-alt':''].filter(Boolean).join(' ');

    return `<tr class="${rc}">${cols.map(c=>{
      if(c.key==='_cb')return `<td style="text-align:center"><input type="checkbox" class="row-cb" ${s.selected.has(r.id)?'checked':''} onchange="togRow('${t}','${r.id}',this.checked)"></td>`;
      if(c.key==='_actions')return `<td><button class="btn btn-sm btn-icon" onclick="event.stopPropagation();openForm('${t}','${r.id}')" title="수정">✏️</button><button class="btn btn-sm btn-icon" onclick="event.stopPropagation();delRecord('${t}','${r.id}')" title="삭제">🗑️</button></td>`;
      if(c.key==='date')return `<td>${fmtDate(r.date)}</td>`;
      if(c.key==='order')return `<td style="text-align:center;font-family:'JetBrains Mono',monospace">${r.order||''}</td>`;
      if(c.key==='title')return `<td class="wrap col-title" style="font-weight:500">${esc(r.title||r.name||'')}</td>`;
      if(c.key==='name')return `<td style="font-weight:500">${esc(r.name||'')}</td>`;
      if(c.key==='original')return `<td>${isOrig?'<span class="original-highlight">본인곡</span>':esc(r.original)}</td>`;
      if(c.key==='camera'){const ck=(r.camera||'').replace(/[^a-zA-Z가-힣0-9]/g,'');return `<td class="inline-editable" onclick="inlineSel('${t}','${r.id}','camera',this)">${r.camera?`<span class="cam-badge cam-${ck}">${esc(r.camera)}</span>`:'-'}</td>`;}
      if(c.key==='key')return `<td class="inline-editable" onclick="inlineSel('${t}','${r.id}','key',this)" style="font-weight:600">${esc(r.key)||'-'}</td>`;
      if(c.key==='status')return `<td class="col-status inline-editable" onclick="inlineSel('${t}','${r.id}','status',this)"><span class="badge badge-${r.status||''}">${esc(r.status)||'-'}</span></td>`;
      if(c.key==='ytDate'){
        let yd='';
        if(r.ytStatus==='미공개')yd=`<span class="badge badge-미공개 ytdate-clickable" onclick="inlineYtDate('${t}','${r.id}',event)">미공개</span>`;
        else if(r.ytDate)yd=`<span class="ytdate-inline" onclick="inlineYtDate('${t}','${r.id}',event)">${fmtDate(r.ytDate)}</span>`;
        else yd=`<span class="ytdate-empty" onclick="inlineYtDate('${t}','${r.id}',event)">+ 게시일</span>`;
        return `<td class="col-ytdate">${yd}</td>`;
      }
      if(c.key==='phone')return `<td style="font-size:11px;color:var(--text-dim)">${esc(r.phone)}</td>`;
      if(c.key==='memo'||c.key==='payment')return `<td class="wrap" style="color:var(--text-dim);font-size:11px" title="${esc(r[c.key])}">${esc(trunc(r[c.key],14))}</td>`;
      // inline editable fields (shorts,lyrics,recording,singCount,result,purpose,source,photo,albumDesign,songCount,cdMake,usbMake)
      if(cfg.inlineFields[c.key])return `<td class="inline-editable" onclick="inlineSel('${t}','${r.id}','${c.key}',this)" style="text-align:center">${fmtChk(r[c.key])}</td>`;
      return `<td>${esc(r[c.key]||'')}</td>`;
    }).join('')}</tr>`;
  }).join('');

  // Pagination
  document.getElementById('pag_'+t).innerHTML=`<span>${filtered.length}건 중 ${filtered.length?start+1:0}-${Math.min(start+PAGE_SIZE,filtered.length)}</span><div class="page-btns"><button class="btn btn-sm" onclick="goP('${t}',${s.page-1})" ${s.page<=1?'disabled':''}>◀</button><span style="padding:0 6px;font-size:12px">${s.page}/${totalP}</span><button class="btn btn-sm" onclick="goP('${t}',${s.page+1})" ${s.page>=totalP?'disabled':''}>▶</button></div>`;

  // Bulk bar
  document.getElementById('bulkCount_'+t).textContent=s.selected.size;
  document.getElementById('bulkBar_'+t).classList.toggle('show',s.selected.size>0);
}
function goP(t,p){state[t].page=p;renderTable(t);}
function togSort(t,col){const s=state[t];if(s.sortCol===col)s.sortDir*=-1;else{s.sortCol=col;s.sortDir=col==='date'?-1:1;}renderTable(t);}

// ═══ INLINE EDIT ═══
function inlineSel(t,id,field,td){
  if(td.querySelector('.inline-select'))return;
  const r=state[t].records.find(x=>x.id===id);if(!r)return;
  const opts=TABS[t].inlineFields[field]||[];
  const sel=document.createElement('select');sel.className='inline-select';
  opts.forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o||'-';if(o===(r[field]||''))op.selected=true;sel.appendChild(op);});
  td.textContent='';td.appendChild(sel);sel.focus();try{sel.showPicker();}catch(e){}
  sel.addEventListener('change',()=>{r[field]=sel.value;saveLocal(t);fsPut(t,r);renderStats(t);renderTable(t);toast('변경 완료','success');});
  sel.addEventListener('blur',()=>setTimeout(()=>renderTable(t),100));
}
function inlineYtDate(t,id,event){
  event.stopPropagation();const td=event.target.closest('td');if(!td||td.querySelector('.ytdate-edit-wrap'))return;
  const r=state[t].records.find(x=>x.id===id);if(!r)return;
  td.innerHTML=`<div class="ytdate-edit-wrap" style="display:flex;gap:3px;align-items:center"><input type="date" class="ytdate-edit-input" value="${r.ytDate||''}" onchange="saveYtD('${t}','${id}',this.value)" style="width:115px"><button class="btn btn-sm" style="padding:2px 6px;font-size:10px" onclick="saveYtP('${t}','${id}')">미공개</button></div>`;
  const inp=td.querySelector('input');inp.focus();try{inp.showPicker();}catch(e){}
  const cl=e=>{if(!td.contains(e.target)){document.removeEventListener('mousedown',cl);renderTable(t);}};setTimeout(()=>document.addEventListener('mousedown',cl),50);
}
function saveYtD(t,id,v){const r=state[t].records.find(x=>x.id===id);if(!r)return;r.ytDate=v;r.ytStatus=v?'':'';saveLocal(t);fsPut(t,r);renderTable(t);toast('게시일 설정','success');}
function saveYtP(t,id){const r=state[t].records.find(x=>x.id===id);if(!r)return;r.ytDate='';r.ytStatus='미공개';saveLocal(t);fsPut(t,r);renderStats(t);renderTable(t);toast('미공개 설정','success');}

// ═══ CHECKBOX / BULK ═══
function togRow(t,id,chk){if(chk)state[t].selected.add(id);else state[t].selected.delete(id);renderTable(t);}
function togAll(t,chk){const page=getFiltered(t).slice((state[t].page-1)*PAGE_SIZE,(state[t].page)*PAGE_SIZE);page.forEach(r=>{if(chk)state[t].selected.add(r.id);else state[t].selected.delete(r.id);});renderTable(t);}
function clearSel(t){state[t].selected.clear();renderTable(t);}
function applyBulk(t){
  const act=document.getElementById('bulkAction_'+t).value;if(!act||!state[t].selected.size){toast('선택 필요','error');return;}
  const[f,v]=act.split(':');let cnt=0;const changed=[];
  state[t].records.forEach(r=>{if(state[t].selected.has(r.id)){r[f]=v;cnt++;changed.push(r);}});
  saveLocal(t);changed.forEach(r=>fsPut(t,r));state[t].selected.clear();
  document.getElementById('bulkAction_'+t).value='';renderAll(t);toast(`${cnt}건 변경`,'success');
}

// ═══ FORM ═══
function openForm(t,id){
  const cfg=TABS[t],s=state[t];s.editId=id||null;
  const r=id?s.records.find(x=>x.id===id):null;
  document.getElementById('modalTitle').textContent=r?`✏️ ${cfg.label} 수정`:`🎵 ${cfg.label} 등록`;
  let html='';
  cfg.formFields.forEach(f=>{
    const val=r?r[f.id]||'':'';
    const cls=f.full?'form-group full':'form-group';
    let input='';
    if(f.type==='date') input=`<input type="date" id="mf_${f.id}" value="${val||(!r?new Date().toISOString().slice(0,10):'')}" ${f.id==='date'?'onchange="updateOrder()"':''}>`;
    else if(f.type==='number') input=`<input type="number" id="mf_${f.id}" value="${val||(!r?getAutoOrd(t):'')}" ${f.ro?'readonly style="opacity:0.7"':''}>`;
    else if(f.type==='select') input=`<select id="mf_${f.id}">${f.opts.map(o=>`<option value="${o}" ${(val||f.def)===o?'selected':''}>${o||'-'}</option>`).join('')}</select>`;
    else if(f.type==='textarea') input=`<textarea id="mf_${f.id}">${esc(val)}</textarea>`;
    else input=`<input type="text" id="mf_${f.id}" value="${esc(val)}" ${f.ac?`oninput="showAC(this,'${f.ac}','${t}')" onfocus="showAC(this,'${f.ac}','${t}')"`:''}>`;
    if(f.ac) html+=`<div class="${cls} autocomplete-wrapper"><label>${f.label}</label>${input}<div class="autocomplete-list" id="acl_${f.ac}_${t}"></div></div>`;
    else html+=`<div class="${cls}"><label>${f.label}</label>${input}</div>`;
  });
  document.getElementById('modalFormGrid').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function getAutoOrd(t){
  const d=document.getElementById('mf_date')?.value||new Date().toISOString().slice(0,10);
  return state[t].records.filter(r=>r.date===d&&r.id!==state[t].editId).length+1;
}
function updateOrder(){const el=document.getElementById('mf_order');if(el)el.value=getAutoOrd(activeTab);}
function saveRecord(){
  const t=activeTab,cfg=TABS[t],s=state[t];
  const data={id:s.editId||genId()};
  cfg.formFields.forEach(f=>{const el=document.getElementById('mf_'+f.id);data[f.id]=el?el.value.trim():'';});
  if(!(data.title||data.name)){toast('제목/이름 입력 필요','error');return;}
  if(s.editId){const i=s.records.findIndex(r=>r.id===s.editId);if(i>=0)s.records[i]=data;}else s.records.push(data);
  saveLocal(t);fsPut(t,data);closeModal();renderAll(t);toast(s.editId?'수정 완료':'등록 완료','success');
}
function delRecord(t,id){
  const r=state[t].records.find(x=>x.id===id);if(!r||!confirm(`"${r.title||r.name}" 삭제?`))return;
  state[t].records=state[t].records.filter(x=>x.id!==id);state[t].selected.delete(id);
  saveLocal(t);fsDel(t,id);renderAll(t);toast('삭제','info');
}

// ═══ AUTOCOMPLETE ═══
function showAC(inp,field,t){
  const list=document.getElementById('acl_'+field+'_'+t),val=inp.value.trim().toLowerCase();
  const all=[...new Set(state[t].records.map(r=>r[field]).filter(Boolean))].sort();
  const filt=val?all.filter(v=>v.toLowerCase().includes(val)):all;
  if(!filt.length||(filt.length===1&&filt[0].toLowerCase()===val)){list.classList.remove('show');return;}
  list.innerHTML=filt.slice(0,8).map(v=>`<div class="autocomplete-item" onmousedown="pickAC('${field}','${t}',this)">${esc(v)}</div>`).join('');
  list.classList.add('show');
}
function pickAC(field,t,el){document.getElementById('mf_'+field).value=el.textContent;document.getElementById('acl_'+field+'_'+t).classList.remove('show');}
document.addEventListener('click',()=>document.querySelectorAll('.autocomplete-list').forEach(l=>l.classList.remove('show')));

// ═══ SCHEDULE ═══
function initSched(){const n=new Date();schedYear=n.getFullYear();schedMonth=n.getMonth();}
function changeMonth(d){schedMonth+=d;if(schedMonth>11){schedMonth=0;schedYear++;}if(schedMonth<0){schedMonth=11;schedYear--;}renderSchedule();}
function goSchedToday(){const n=new Date();schedYear=n.getFullYear();schedMonth=n.getMonth();renderSchedule();}
function renderSchedule(){
  document.getElementById('scheduleMonthLabel').textContent=`${schedYear}년 ${schedMonth+1}월`;
  const fd=new Date(schedYear,schedMonth,1),ld=new Date(schedYear,schedMonth+1,0),sd=fd.getDay(),dim=ld.getDate(),ts=new Date().toISOString().slice(0,10);
  const days=['일','월','화','수','목','금','토'];let h=days.map(d=>`<div class="schedule-header">${d}</div>`).join('');
  const pl=new Date(schedYear,schedMonth,0).getDate();
  for(let i=sd-1;i>=0;i--)h+=`<div class="schedule-cell other-month"><div class="schedule-date">${pl-i}</div></div>`;
  const vr=state.video.records;
  for(let d=1;d<=dim;d++){
    const ds=`${schedYear}-${String(schedMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dr=vr.filter(r=>r.ytDate===ds);
    const items=dr.map(r=>{const c=r.status==='취소'?'cancelled':(r.ytStatus!=='미공개'?'published':'');return `<div class="schedule-item ${c}" title="${r.singer}-${r.title}">${r.singer}-${trunc(r.title,5)}</div>`;}).join('');
    h+=`<div class="schedule-cell ${ds===ts?'today':''}"><div class="schedule-date">${d}</div>${items}</div>`;
  }
  const rem=(7-((sd+dim)%7))%7;for(let i=1;i<=rem;i++)h+=`<div class="schedule-cell other-month"><div class="schedule-date">${i}</div></div>`;
  document.getElementById('scheduleGrid').innerHTML=h;
  const up=vr.filter(r=>r.ytDate&&r.ytDate>=ts&&r.status!=='취소').sort((a,b)=>a.ytDate.localeCompare(b.ytDate)).slice(0,12);
  document.getElementById('scheduleDayDetail').innerHTML=up.length?`<div class="section-title" style="margin-top:16px">📌 업로드 예정</div><div class="table-container"><div class="table-scroll"><table><thead><tr><th>게시일</th><th>가수</th><th>노래</th><th>상태</th></tr></thead><tbody>${up.map(r=>`<tr><td>${fmtDate(r.ytDate)}</td><td>${esc(r.singer)}</td><td style="font-weight:500">${esc(r.title)}</td><td><span class="badge badge-${r.ytStatus==='미공개'?'미공개':'예정'}">${r.ytStatus||'예정'}</span></td></tr>`).join('')}</tbody></table></div></div>`:'';
}

// ═══ CSV ═══
let csvData=null;
function setupDrag(){const z=document.getElementById('importZone');z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dragover');});z.addEventListener('dragleave',()=>z.classList.remove('dragover'));z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('dragover');if(e.dataTransfer.files.length)procCSV(e.dataTransfer.files[0]);});}
function handleCSVFile(e){if(e.target.files.length)procCSV(e.target.files[0]);}
function procCSV(f){Papa.parse(f,{header:true,skipEmptyLines:true,encoding:'UTF-8',complete:r=>{csvData=r.data;showCSVPrev(r);},error:e=>toast('CSV 오류','error')});}
function showCSVPrev(res){
  const hds=res.meta.fields||[],prev=res.data.slice(0,5);
  const t=document.getElementById('csvTargetTab').value,cfg=TABS[t];
  const fm=cfg.formFields.map(f=>({key:f.id,label:f.label,g:[f.label,f.id]}));
  function guess(f){for(const g of f.g){const i=hds.findIndex(h=>h.trim()===g);if(i>=0)return hds[i];}for(const g of f.g){const i=hds.findIndex(h=>h.includes(g)&&!(f.key==='recording'&&h.includes('녹음일'))&&!(f.key==='recording'&&h.includes('녹화일')));if(i>=0)return hds[i];}return '';}
  document.getElementById('csvPreview').innerHTML=`<div class="section-title">미리보기</div><div class="table-container"><div class="table-scroll"><table><thead><tr>${hds.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${prev.map(row=>`<tr>${hds.map(h=>`<td>${esc(row[h]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;
  document.getElementById('csvMapping').innerHTML=`<div class="section-title" style="margin-top:16px">컬럼 매핑 (${cfg.label})</div><div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px"><div class="form-grid">${fm.map(f=>{const g=guess(f);return `<div class="form-group"><label>${f.label}</label><select id="map_${f.key}" class="filter-select"><option value="">-</option>${hds.map(h=>`<option value="${esc(h)}" ${h===g?'selected':''}>${esc(h)}</option>`).join('')}</select></div>`;}).join('')}</div><div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;align-items:center"><span style="font-size:12px;color:var(--text-dim)">${csvData.length}건</span><button class="btn btn-primary" onclick="doCSVImport()">가져오기</button></div></div>`;
}
function doCSVImport(){
  if(!csvData||!csvData.length){toast('데이터 없음','error');return;}
  const t=document.getElementById('csvTargetTab').value,cfg=TABS[t],s=state[t];
  const m={};cfg.formFields.forEach(f=>{m[f.id]=document.getElementById('map_'+f.id)?.value||'';});
  const existKeys=new Set(s.records.map(r=>`${r.date}|${r.order}|${r.title||r.name}|${r.singer||r.name}`));
  let cnt=0,skip=0;
  csvData.forEach(row=>{
    const r={id:genId()};
    cfg.formFields.forEach(f=>{
      let v=(row[m[f.id]]||'').trim();
      if(f.id==='date'||f.id==='ytDate')v=normDate(v);
      if(f.id==='ytDate'&&(v==='미공개'||(row[m[f.id]]||'').includes('미공개'))){r.ytStatus='미공개';v='';}
      r[f.id]=v;
    });
    if(!r.status)r.status='';
    if(!(r.title||r.name)){return;}
    const key=`${r.date}|${r.order}|${r.title||r.name}|${r.singer||r.name}`;
    if(existKeys.has(key)){skip++;return;}
    existKeys.add(key);s.records.push(r);cnt++;
  });
  saveLocal(t);fsSync(t);
  let msg=`${cnt}건 가져오기 완료!`;if(skip)msg+=` (중복 ${skip}건 건너뜀)`;
  toast(msg,'success');switchTab(t);
}
function normDate(v){if(!v)return '';const m1=v.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);if(m1)return `${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;const m2=v.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);if(m2)return `${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;return '';}

// ═══ JSON ═══
function exportJSON(){
  const all={};['video','audio','cd'].forEach(t=>{all[t]=state[t].records;});
  const b=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`snb_works_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);toast('JSON 내보내기 완료','success');
}
function importJSON(){document.getElementById('jsonFileInput').click();}
function handleJSONImport(e){
  const f=e.target.files[0];if(!f)return;const reader=new FileReader();
  reader.onload=ev=>{try{
    const d=JSON.parse(ev.target.result);
    if(Array.isArray(d)){if(!confirm(`${d.length}건을 ${TABS[activeTab].label}에 추가?`))return;d.forEach(r=>{if(!r.id)r.id=genId();state[activeTab].records.push(r);});saveLocal(activeTab);fsSync(activeTab);}
    else{['video','audio','cd'].forEach(t=>{if(d[t]&&Array.isArray(d[t])){state[t].records=d[t];saveLocal(t);}});['video','audio','cd'].forEach(t=>fsSync(t));}
    renderAll(activeTab);toast('가져오기 완료','success');
  }catch(err){toast('JSON 오류','error');}};reader.readAsText(f);e.target.value='';
}

// ═══ UTILS ═══
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function trunc(s,n){return(s||'').length>n?s.slice(0,n)+'…':(s||'');}
function fmtDate(d){if(!d)return '';const p=d.split('-');return p.length===3?`${p[0]}. ${parseInt(p[1])}. ${parseInt(p[2])}`:(d);}
function fmtChk(v){if(v==='○')return '<span style="color:#22c55e;font-weight:800;font-size:14px">○</span>';if(v==='×')return '<span style="color:#ef4444;font-weight:800;font-size:14px">×</span>';if(v&&v!=='-'&&v!=='')return `<span style="font-weight:600">${esc(v)}</span>`;return '<span style="color:#55556a">-</span>';}
function toast(msg,type='info'){const c=document.getElementById('toastContainer'),el=document.createElement('div');el.className='toast toast-'+type;el.textContent=msg;c.appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300)},2500);}

// ═══ INIT ═══
(async function(){
  // 이전 버전 localStorage 마이그레이션 (snb_recording_v1 → snb_video_v1)
  try{
    const oldData=localStorage.getItem('snb_recording_v1');
    const newData=localStorage.getItem('snb_video_v1');
    if(oldData && (!newData || JSON.parse(newData).length===0)){
      localStorage.setItem('snb_video_v1', oldData);
      console.log('이전 버전 데이터 마이그레이션 완료 (snb_recording_v1 → snb_video_v1)');
    }
  }catch(e){}

  ['video','audio','cd'].forEach(t=>{state[t].records=loadLocal(t);});
  initSched();renderAll('video');setupDrag();
  for(const t of['video','audio','cd']){
    try{
      const fs=await fsGet(t);if(!fs)continue;
      const lc=state[t].records.length,fc=fs.length;
      if(fc>0&&fc>=lc){state[t].records=fs;saveLocal(t);}
      else if(lc>fc&&lc>0)fsSync(t);
    }catch(e){}
  }
  renderAll(activeTab);
})();
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='n'){e.preventDefault();openForm(activeTab);}if(e.key==='Escape')closeModal();});
</script>
